services:
  storage-init:
    image: alpine:3.24.1
    container_name: summerain-storage-init
    restart: "no"
    user: "0:0"
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /data/images/.staging /data/images/v2
        chown 10001:10001 /data/images /data/images/.staging /data/images/v2
        chmod 0750 /data/images /data/images/.staging /data/images/v2
    volumes:
      - image_storage:/data/images

  backend:
    image: ${DOCKER_IMAGE:-jaykserks/summerain:latest}
    container_name: summerain-backend
    restart: unless-stopped
    stop_grace_period: 40s
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      GOMEMLIMIT: 512MiB
      TEMP_PATH: /data/images/.staging
    volumes:
      - image_storage:/data/images
    depends_on:
      storage-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      imgproxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    cpus: "0.75"
    mem_limit: 640m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - image-network

  mysql:
    image: mysql:8.4.10
    container_name: summerain-mysql
    restart: unless-stopped
    stop_grace_period: 45s
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-summerain}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    cpus: "0.75"
    mem_limit: 1024m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - image-network

  redis:
    image: redis:8.8.0-alpine
    container_name: summerain-redis
    restart: unless-stopped
    stop_grace_period: 15s
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    cpus: "0.15"
    mem_limit: 192m
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - image-network

  # V2 fixed display variants bypass imgproxy; publish watermarks and V1 use it.
  imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v4.0.11
    container_name: summerain-imgproxy
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      IMGPROXY_BIND: :8080
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /data
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_MAX_ANIMATION_FRAMES: "100"
      IMGPROXY_WORKERS: ${IMGPROXY_WORKERS:-2}
      IMGPROXY_REQUESTS_QUEUE_SIZE: "4"
      IMGPROXY_TTL: "31536000"
      IMGPROXY_KEY: ${IMGPROXY_KEY:?Set IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT:?Set IMGPROXY_SALT}
      # watermark.go writes this SVG into STORAGE_PATH for legacy processing.
      IMGPROXY_WATERMARK_PATH: /data/images/watermark.svg
    volumes:
      - image_storage:/data/images:ro
    group_add:
      - "10001"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    cpus: "0.70"
    mem_limit: 512m
    pids_limit: 128
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - image-network

volumes:
  mysql_data:
  redis_data:
  image_storage:

networks:
  image-network:
    driver: bridge
