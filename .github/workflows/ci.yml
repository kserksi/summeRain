name: CI and Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  release_info:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.release.outputs.is_release }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect VERSION change
        id: release
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "version=" >> "$GITHUB_OUTPUT"
          echo "tag=" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" != "push" ]; then
            exit 0
          fi

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            version_changed=true
          elif git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- VERSION; then
            version_changed=false
          else
            version_changed=true
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "::error::VERSION must be SemVer, for example 1.2.3 or 1.2.3-rc.1"
            exit 1
          fi

          tag="v${version}"
          existing_sha="$(git ls-remote --refs origin "refs/tags/${tag}" | awk '{print $1}')"
          if [ "$version_changed" = "true" ]; then
            if [ -n "$existing_sha" ]; then
              echo "::error::${tag} already exists; increment VERSION instead of reusing a release tag"
              exit 1
            fi
          elif [ -n "$existing_sha" ]; then
            exit 0
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

  docker:
    name: Publish container images
    if: github.event_name == 'push'
    needs: [release_info, backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set image names
        run: |
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=jaykserks/summerain" >> "$GITHUB_ENV"

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "::error::DOCKERHUB_USERNAME secret is not configured"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "::error::DOCKERHUB_TOKEN secret is not configured"; exit 1; }

      - name: Prepare Docker Hub tag policy
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IS_RELEASE: ${{ needs.release_info.outputs.is_release }}
        run: |
          mode=release
          if [ "$IS_RELEASE" = "true" ]; then
            mode=mutable
          fi
          bash .github/scripts/set-dockerhub-tag-policy.sh "$mode"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge,enable=${{ needs.release_info.outputs.is_release != 'true' }}
            type=raw,value=latest,enable=${{ needs.release_info.outputs.is_release == 'true' && needs.release_info.outputs.prerelease != 'true' }}
            type=raw,value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' }}
            type=semver,pattern={{version}},value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' }}
            type=semver,pattern={{major}},value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=summerain-container
          cache-to: type=gha,mode=max,scope=summerain-container
          provenance: mode=max
          sbom: true

  github_release:
    name: Publish GitHub Release
    if: needs.release_info.outputs.is_release == 'true'
    needs: [release_info, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create release and Git tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release_info.outputs.tag }}
          PRERELEASE: ${{ needs.release_info.outputs.prerelease }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "${RELEASE_TAG} already exists; keeping the existing immutable release"
            exit 0
          fi

          args=(release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes)
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

  dockerhub_metadata:
    name: Docker Hub tag policy and README
    if: >-
      ${{ always() && github.event_name == 'push' && needs.docker.result == 'success' &&
          (needs.release_info.outputs.is_release != 'true' || needs.github_release.result == 'success') }}
    needs: [release_info, docker, github_release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Enforce immutable release tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: bash .github/scripts/set-dockerhub-tag-policy.sh release

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: jaykserks/summerain
          readme-filepath: ./README.md
          short-description: Self-hosted image hosting and photo album service.
          enable-url-completion: true
