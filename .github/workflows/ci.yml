name: CI and Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  release_info:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.release.outputs.is_release }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Detect VERSION change
        id: release
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "is_release=false" >> "$GITHUB_OUTPUT"
          echo "version=" >> "$GITHUB_OUTPUT"
          echo "tag=" >> "$GITHUB_OUTPUT"
          echo "prerelease=false" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" != "push" ]; then
            exit 0
          fi

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            version_changed=true
          elif git diff --quiet "$BEFORE_SHA" "$CURRENT_SHA" -- VERSION; then
            version_changed=false
          else
            version_changed=true
          fi

          # Command substitution removes trailing newlines but preserves any
          # malformed whitespace inside VERSION for strict validation.
          version="$(< VERSION)"
          if ! bash scripts/validate-release-version.sh "$version"; then
            echo "::error::VERSION must be strict SemVer without build metadata, for example 1.2.3 or 1.2.3-rc.1"
            exit 1
          fi

          tag="v${version}"
          existing_ref_sha="$(git ls-remote --refs origin "refs/tags/${tag}" | awk '{print $1}')"
          if [ "$version_changed" != "true" ]; then
            exit 0
          fi
          if [ -n "$existing_ref_sha" ]; then
            # Resolve annotated and lightweight tags to the commit they name.
            git fetch --force --no-tags origin "refs/tags/${tag}:refs/tags/${tag}"
            existing_sha="$(git rev-list -n 1 "refs/tags/${tag}")"
            if [ "$existing_sha" != "$CURRENT_SHA" ]; then
              echo "::error::${tag} already points to ${existing_sha}; increment VERSION instead of reusing a release tag"
              exit 1
            fi
            echo "::notice::${tag} already points to this commit; resuming the release"
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "is_release=true" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  dependency_lock:
    name: Dependency lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify requirements.lock
        run: bash scripts/verify-requirements-lock.sh

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.26.5
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Verify dependency checksums
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run

  docker:
    name: Publish container images
    if: github.event_name == 'push'
    needs: [release_info, dependency_lock, backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set image names
        run: |
          echo "GHCR_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=jaykserks/summerain" >> "$GITHUB_ENV"

      - name: Validate Docker Hub credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "::error::DOCKERHUB_USERNAME secret is not configured"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "::error::DOCKERHUB_TOKEN secret is not configured"; exit 1; }

      - name: Enforce immutable release tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: bash .github/scripts/set-dockerhub-tag-policy.sh release

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare release image publish
        id: release_images
        env:
          IS_RELEASE: ${{ needs.release_info.outputs.is_release }}
          RELEASE_VERSION: ${{ needs.release_info.outputs.version }}
          PRERELEASE: ${{ needs.release_info.outputs.prerelease }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          echo "skip_push=false" >> "$GITHUB_OUTPUT"

          if [ "$IS_RELEASE" != "true" ]; then
            exit 0
          fi

          mode=fresh
          if [ "$RUN_ATTEMPT" -gt 1 ]; then
            mode=recover
          fi
          result="$(bash .github/scripts/reconcile-release-images.sh \
            "$mode" "$DOCKERHUB_IMAGE" "$GHCR_IMAGE" \
            "$RELEASE_VERSION" "$PRERELEASE" "$GITHUB_SHA")"

          if [ "$result" = recovered ]; then
            echo "skip_push=true" >> "$GITHUB_OUTPUT"
            echo "::notice::All release tags were recovered at one verified digest; skipping the image build"
          elif [ "$result" != build ]; then
            echo "::error::Unexpected release reconciliation result: ${result}"
            exit 1
          fi

      - name: Generate image metadata
        id: meta
        if: steps.release_images.outputs.skip_push != 'true'
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 12
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge,enable=${{ needs.release_info.outputs.is_release != 'true' }}
            type=raw,value=latest,enable=${{ needs.release_info.outputs.is_release == 'true' && needs.release_info.outputs.prerelease != 'true' }}
            type=raw,value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' }}
            type=semver,pattern={{version}},value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' && needs.release_info.outputs.prerelease != 'true' }}
            type=semver,pattern={{major}},value=${{ needs.release_info.outputs.tag || 'v0.0.0' }},enable=${{ needs.release_info.outputs.is_release == 'true' && needs.release_info.outputs.prerelease != 'true' }}
            type=sha,prefix=sha-

      - name: Build and push image
        if: steps.release_images.outputs.skip_push != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=summerain-container
          cache-to: type=gha,mode=max,scope=summerain-container
          provenance: mode=max
          sbom: true

      - name: Verify release image tags
        if: needs.release_info.outputs.is_release == 'true'
        env:
          RELEASE_VERSION: ${{ needs.release_info.outputs.version }}
          PRERELEASE: ${{ needs.release_info.outputs.prerelease }}
        run: |
          bash .github/scripts/reconcile-release-images.sh \
            verify "$DOCKERHUB_IMAGE" "$GHCR_IMAGE" \
            "$RELEASE_VERSION" "$PRERELEASE" "$GITHUB_SHA"

  github_release:
    name: Publish GitHub Release
    if: needs.release_info.outputs.is_release == 'true'
    needs: [release_info, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Create release and Git tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release_info.outputs.tag }}
          PRERELEASE: ${{ needs.release_info.outputs.prerelease }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "${RELEASE_TAG} already exists; keeping the existing immutable release"
            exit 0
          fi

          args=(release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes)
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

  dockerhub_metadata:
    name: Docker Hub tag policy and README
    if: >-
      ${{ always() && github.event_name == 'push' && needs.docker.result == 'success' &&
          (needs.release_info.outputs.is_release != 'true' || needs.github_release.result == 'success') }}
    needs: [release_info, docker, github_release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Enforce immutable release tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: bash .github/scripts/set-dockerhub-tag-policy.sh release

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: jaykserks/summerain
          readme-filepath: ./README.md
          short-description: Self-hosted image hosting and photo album service.
          enable-url-completion: true
